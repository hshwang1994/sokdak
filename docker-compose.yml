version: "3.9"

# ──────────────────────────────────────────────────────────────────
# SOKDAK Product Runtime (Paperclip과 완전 분리)
#
# Paperclip (control plane): docker-db-1:5432, docker-server-1:3100
# SOKDAK   (product):        sokdak-db:5433,   sokdak-web:3000
#
# 절대 금지: Paperclip DB/volume/network/env와 공유
# 참조: docs/policies/product-runtime-isolation.md
# ──────────────────────────────────────────────────────────────────

services:
  # ─── PostgreSQL 16 (SOKDAK 전용, port 5433) ───
  db:
    image: postgres:16-alpine
    container_name: sokdak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sokdak
      POSTGRES_USER: sokdak
      POSTGRES_PASSWORD: sokdak_dev
    ports:
      - "5433:5432"
    volumes:
      - sokdak-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sokdak -d sokdak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 (SOKDAK 전용, port 6380) ───
  redis:
    image: redis:7-alpine
    container_name: sokdak-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - sokdak-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Next.js App ───
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sokdak-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://sokdak:sokdak_dev@db:5432/sokdak?schema=public"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Background Worker ───
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: sokdak-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://sokdak:sokdak_dev@db:5432/sokdak?schema=public"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  sokdak-pgdata:
  sokdak-redis-data:
